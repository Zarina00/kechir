<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Кешірші 💔</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: pink;
  font-family: Arial;
  text-align: center;
  overflow: hidden;
}

h1 {
  margin-top: 100px;
}

/* Батырмалар қатар тұру үшін */
.buttons {
  margin-top: 20px;
}

button {
  padding: 10px 20px;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin: 10px;
}

#yes {
  background: green;
  color: white;
}

#no {
  background: red;
  color: white;
  position: relative; /* Бастапқыда орнында тұрсын */
}

.heart {
  position: absolute;
  color: red;
  font-size: 20px;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}
</style>

</head>

<body>

<h1> Фари мені кешірші 🥺</h1>
<p>Кешіресің ба?</p>

<div class="buttons">
  <button id="yes" onclick="yesClick()">Ия</button>
  <button id="no">Жоқ</button>
</div>

<script>
const noBtn = document.getElementById("no");

// Енді жақындағанда ғана қашады
noBtn.addEventListener("mouseover", () => {
  noBtn.style.position = "absolute";

  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});

// Ия басқанда
function yesClick() {
  document.body.innerHTML = "<h1>Рахмет ❤️</h1>";
}

// Жүрекшелер
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
